<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cupón VittaKids — S/10 dto.</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark:  #1A3A8F;
    --blue-mid:   #2563EB;
    --blue-light: #60C3F0;
    --green:      #4BC97A;
    --purple:     #7C3AED;
    --gold:       #F59E0B;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #e0f0ff 0%, #d4f5e9 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .coupon {
    width: min(500px, 100%);
    background: #fff;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(26,58,143,0.18), 0 4px 16px rgba(0,0,0,0.08);
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 60%, var(--blue-light) 100%);
    padding: 22px 22px 0;
    position: relative;
    overflow: hidden;
    min-height: 130px;
  }
  .header::before {
    content:''; position:absolute; inset:0;
    background:
      radial-gradient(circle at 15% 25%, rgba(255,255,255,0.13) 0%, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(96,195,240,0.2) 0%, transparent 40%);
    pointer-events:none;
  }

  /* Burbujas */
  .bubble { position:absolute; border-radius:50%; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.28); }
  .b1{ width:30px;height:30px; top:14px; right:50px; }
  .b2{ width:14px;height:14px; top:38px; right:84px; }
  .b3{ width:22px;height:22px; top:10px; right:124px; }
  .b4{ width:10px;height:10px; top:58px; right:44px; }
  .b5{ width:8px; height:8px;  top:72px; right:110px; }
  .b6{ width:18px;height:18px; bottom:40px; left:30px; }
  .b7{ width:9px; height:9px;  bottom:60px; left:58px; }

  .logo-wrap { position:relative; z-index:2; }
  .logo-wrap img { height:50px; width:auto; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.25)); }

  .solo-hoy {
    position:relative; z-index:2; margin-top:11px;
    display:inline-block;
    background: var(--gold); color: var(--blue-dark);
    font-family:'Fredoka One',cursive; font-size:14px; letter-spacing:.5px;
    padding:5px 18px; border-radius:999px;
    box-shadow: 0 3px 12px rgba(245,158,11,0.5);
  }

  .stars { position:absolute; top:18px; left:22px; display:flex; gap:5px; z-index:2; }
  .star { font-size:12px; color:rgba(255,255,255,0.85); animation:twinkle 1.8s infinite ease-in-out; }
  .star:nth-child(2){ animation-delay:.5s; }
  .star:nth-child(3){ animation-delay:1s; }
  .star:nth-child(4){ animation-delay:.3s; font-size:9px; }
  @keyframes twinkle {0%,100%{opacity:.85;transform:scale(1)} 50%{opacity:.15;transform:scale(.55)}}

  /* ── DESCUENTO ── */
  .descuento-wrap {
    background: linear-gradient(135deg, #f0f9ff, #f5f3ff);
    padding: 24px 24px 20px; text-align:center; position:relative;
    border-bottom: 2px dashed #c4d4f0;
  }
  .descuento-wrap::after {
    content:''; position:absolute;
    left:-12px; right:-12px; bottom:-13px;
    height:26px;
    background: radial-gradient(circle at 12px 12px, #fff 11px, transparent 12px) repeat-x;
    background-size:26px 26px; z-index:1;
  }
  .dto-badge {
    display:inline-flex; align-items:center; gap:4px;
    background: linear-gradient(135deg, var(--purple), var(--blue-mid));
    color:#fff; border-radius:22px; padding:10px 34px;
    box-shadow: 0 8px 24px rgba(124,58,237,0.38);
    position:relative; overflow:hidden;
  }
  .dto-badge::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
    animation:shimmer 2.4s infinite;
  }
  @keyframes shimmer {0%{transform:translateX(-100%)} 100%{transform:translateX(100%)}}
  .dto-sol  { font-family:'Fredoka One',cursive; font-size:30px; line-height:1; opacity:.9; padding-top:8px; }
  .dto-num  { font-family:'Fredoka One',cursive; font-size:78px; line-height:1; }
  .dto-text { font-family:'Fredoka One',cursive; font-size:22px; line-height:1; padding-top:6px; }
  .dto-sub  { margin-top:12px; font-size:13px; color:#4B5563; font-weight:700; letter-spacing:.2px; }

  /* ── BODY ── */
  .body { padding:22px 24px 18px; text-align:center; }
  .titulo {
    font-family:'Fredoka One',cursive;
    font-size:22px; color:var(--blue-dark); line-height:1.28; margin-bottom:6px;
  }
  .titulo span { color:var(--green); }
  .sub { font-size:13px; color:#6B7280; font-weight:700; margin-bottom:20px; }
  .wa-btn {
    display:inline-flex; align-items:center; gap:10px;
    background:linear-gradient(135deg,#22C55E,#16A34A);
    color:#fff; text-decoration:none;
    font-family:'Fredoka One',cursive; font-size:17px;
    padding:14px 32px; border-radius:999px;
    box-shadow:0 6px 18px rgba(34,197,94,0.42);
    transition:transform .15s, box-shadow .15s; letter-spacing:.3px;
  }
  .wa-btn:hover { transform:translateY(-2px); box-shadow:0 10px 26px rgba(34,197,94,0.52); }
  .wa-icon {
    width:26px;height:26px; background:#fff; border-radius:50%;
    display:flex;align-items:center;justify-content:center; flex-shrink:0;
  }

  /* ── FOOTER ── */
  .footer { background:linear-gradient(135deg,var(--blue-dark),#0F2563); padding:15px 24px; text-align:center; }
  .footer-txt { font-size:12px; color:rgba(255,255,255,0.75); font-weight:700; letter-spacing:.2px; }
  .footer-txt strong { color:#fff; font-size:13px; }
</style>
</head>
